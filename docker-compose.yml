version: '3.8'

services:
  # ===========================================================================
  # Integrated Agent - Main Application
  # ===========================================================================
  integrated-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: integrated-agent
    restart: unless-stopped
    ports:
      - "18792:18792"   # OpenClaw Gateway
      - "18789:18789"   # ACP Server
    volumes:
      - ./workspace:/app/workspace
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock  # Docker access for sandbox
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY=ws://127.0.0.1:18789
      - OPENCLAW_SESSION_ID=${OPENCLAW_SESSION_ID:-local-dev}
      - DATA_DIR=/app/data
      - LOG_DIR=/app/data/audit
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18792/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Redis - Message Queue & Caching
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: integrated-agent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # ChromaDB - Vector Store for Semantic Context
  # ===========================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: integrated-agent-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Prometheus - Metrics Collection
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: integrated-agent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - agent-network
    depends_on:
      - integrated-agent

  # ===========================================================================
  # Grafana - Metrics Dashboard
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: integrated-agent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - agent-network
    depends_on:
      - prometheus

  # ===========================================================================
  # Vector.dev - Log Collection
  # ===========================================================================
  vector:
    image: timberio/vector:0.28-alpine
    container_name: integrated-agent-vector
    restart: unless-stopped
    volumes:
      - ./docker/vector.toml:/etc/vector/vector.toml:ro
      - ./data/audit:/var/log/audit:ro
    depends_on:
      - integrated-agent
    networks:
      - agent-network

# =============================================================================
# Networks
# =============================================================================
networks:
  agent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis-data:
    driver: local
  chroma-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
